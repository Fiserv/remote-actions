name: API Specs Validator
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      statuscheck:
        description: "Output of Api validation job"
        value: ${{ jobs.api_validator_actions.outputs.output1 }}  
  push:
    branches: [ develop,stage,preview,main, previous ]
    paths:
      - 'reference/**'     
  pull_request:
    branches: [ develop,stage,preview,main,previous ]
    paths:
      - 'reference/**' 
      
jobs:
  api_validator_actions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      output1: ${{ steps.apivalidate.outputs.JobStatus }}        
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and ${GITHUB_REF##*/} and ${GITHUB_REF#refs/heads/} and your repository is ${{ github.repository }}." 
      - name: Creating new temp sub dir called `tools`
        run: |
         mkdir -m 777 tools
         cd tools
         pwd
         ls -la
      - name: Check out ${{ github.repository }} Repo code at ${{ github.workspace }}
        uses: actions/checkout@v3
        with:
         repository: ${{ github.repository }}
         path: ${{ github.workspace }}
      - name: Check out Fiserv/remote-actions Repo code at ${{ github.workspace }}/tools
        uses: actions/checkout@v3
        with:
         repository: Fiserv/remote-actions
         ref: develop
         path: ${{ github.workspace }}/tools
      - name: List files in the repository
        run: |
         cd ${{ github.workspace }}
         pwd
         ls -la
         cd ${{ github.workspace }}/tools
         pwd
         ls -la
      - run: echo "💡 The ${{ github.repository }} repository has been cloned on root"
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
         pwd
         ls -la

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v3
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list

      - name: Running API Specs Validator.....
        id : apivalidate      
        run: |
          pwd
          cd ${{ github.workspace }}/tools/scripts
          ls -la
          npmv=$(npm --version)
          echo "NPM version installed : " $npmv
          nodev=$(node --version)
          echo "Node version installed : " $nodev
          npm install
          echo " Repo: ${{ github.repository }}"
          echo " Space: ${{ github.workspace }}"
          result=$(npm run validate ${{github.workspace }})
          echo "**********TEST RESULTS*********************"
          echo "$result"
          pwd
          ls -la
          rm -rf ${{github.workspace }}/tools
          echo "Temp tools directory deleted ......"
          if [[ $result == *'VALIDATOR FAILED'* ]] ;then
            echo "Validator failed and exiting the Job..."
            exit 1 
          elif [[ $result == *'PASSED'* ]] ;then
            echo "Validator Ran Successfully....🍏" 
          elif [[ $result == *'SKIPPED'* ]] ;then
            echo "Validator JOB IS SKIPPED"
            echo "JobStatus="$result >> $GITHUB_OUTPUT                    
          fi
        # env:
        #   GH_TOKEN: ${{ secrets.ZIP_GENERATOR_ACTION }}          
      - run: echo "🍏 This job's status is ${{ job.status }} and output - ${{ steps.apivalidate.outputs.JobStatus }}"

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install Prism CLI
        run: npm install -g @stoplight/prism-cli
      - name: Run Prism Mock
        run: |
          prism_failure=false
          for file in $(find reference -type f -name '*.yaml'); do
            current_file_success=true
            prism mock $file &
            prism_pid=$!
            timeout=30
            sleep_interval=5
            counter=0
            while ! curl -sSf http://localhost:4010 2>&1 >/dev/null; do
                counter=$((counter + 1))
                if [ "$counter" -gt "$timeout" ]; then
                    echo "Prism mock did not start within $timeout seconds for $file."
                    prism_failure=true
                    current_file_success=false
                    break
                fi
                sleep $sleep_interval
            done
            if [[ $current_file_success ]]; then
              echo "Prism mock started successfully."
              kill -TERM $prism_pid
            fi
          done
          if [[ $prism_failure ]]; then exit 1; fi

      - name: Install Spectral
        run: npm install -g @stoplight/spectral
      - name: Spectral API Validation
        run: |
          spectral_failure=false
          echo 'extends: ["spectral:oas", "spectral:asyncapi"]' > .spectral.yaml
          for file in $(find reference -type f -name '*.yaml'); do
            spectral lint $file --ruleset .spectral.yaml || spectral_failure=true
          done
          if [[ $spectral_failure ]]; then exit 1; fi

      - name: Install Swagger CLI
        run: npm install -g swagger-cli
      - name: Validate API Specifications
        run: |
          for file in $(find reference -type f -name '*.yaml'); do
            swagger-cli validate $file
          done
      
      - run: echo "🍏 This job's status is ${{ job.status }} and output - ${{ steps.sizevalidate.outputs.JobStatus }}"
